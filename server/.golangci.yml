version: "2"
linters:
  enable:
    - depguard
    - misspell
    - unconvert
  settings:
    depguard:
      rules:
        handlers:
          list-mode: lax
          files:
            - "**/internal/handlers/**"
          deny:
            - pkg: github.com/AdityaSinghRajawat/tryit/server/internal/integrations
              desc: handlers must depend only on service ports, not integrations
        services:
          list-mode: lax
          files:
            - "**/internal/services/**"
          deny:
            - pkg: github.com/AdityaSinghRajawat/tryit/server/internal/handlers
              desc: services must not depend on handlers
            - pkg: github.com/AdityaSinghRajawat/tryit/server/internal/integrations
              desc: services depend on ports they own, not concrete integrations
        integrations:
          list-mode: lax
          files:
            - "**/internal/integrations/**"
          deny:
            - pkg: github.com/AdityaSinghRajawat/tryit/server/internal/handlers
              desc: integrations do not depend on handlers
        middlewares:
          list-mode: lax
          files:
            - "**/internal/middlewares/**"
          deny:
            - pkg: github.com/AdityaSinghRajawat/tryit/server/internal/services
              desc: middlewares depend on integration readers, not services
            - pkg: github.com/AdityaSinghRajawat/tryit/server/internal/handlers
              desc: middlewares do not depend on handlers
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
